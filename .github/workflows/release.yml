name: Release

on:
  workflow_dispatch:
    inputs:
      release_as:
        description: "Version bump to release. Use 'auto' to derive it from conventional commits, or force a specific bump."
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major
      publish_marketplace:
        description: "Also publish this release to the JetBrains Marketplace."
        type: boolean
        default: true

permissions:
  contents: write

# Ensure only one release workflow runs at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install standard-version
        run: npm install -g standard-version

      - name: Generate Changelog and Bump Version
        id: changelog
        run: |
          # Run standard-version to bump version and generate changelog.
          # release_as=auto derives the bump from conventional commits;
          # any other value forces that bump (overriding commit-based detection).
          RELEASE_AS="${{ github.event.inputs.release_as }}"
          if [ -n "$RELEASE_AS" ] && [ "$RELEASE_AS" != "auto" ]; then
            standard-version --releaseCommitMessageFormat "chore(release): {{currentTag}}" --release-as "$RELEASE_AS"
          else
            standard-version --releaseCommitMessageFormat "chore(release): {{currentTag}}"
          fi
          
          # Extract the new version from package.json
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          
          # Extract changelog for this release
          CHANGELOG=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          
          # Set outputs
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "skipped=false" >> $GITHUB_OUTPUT
          
          # Use heredoc for multiline changelog
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "clean_changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
          
          echo "Generated version: $VERSION"
          echo "Generated tag: $TAG"

      - name: Debug Changelog Outputs
        run: |
          echo "Version: '${{ steps.changelog.outputs.version }}'"
          echo "Tag: '${{ steps.changelog.outputs.tag }}'"
          echo "Skipped: '${{ steps.changelog.outputs.skipped }}'"

      - name: Get Version
        id: get-version
        run: |
          echo "version=${{ steps.changelog.outputs.version }}" >> $GITHUB_OUTPUT
          echo "tag=${{ steps.changelog.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Sync version to gradle.properties
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          VERSION=${{ steps.get-version.outputs.version }}
          sed -i "s/^pluginVersion=.*/pluginVersion=$VERSION/" gradle.properties
          
          # Amend the release commit to include gradle.properties
          git add gradle.properties
          git commit --amend --no-edit
          
          # Push the commit and tag
          git push --follow-tags

      - name: Build plugin
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: ./gradlew buildPlugin

      - name: Verify plugin
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: ./gradlew verifyPlugin

      - name: Create GitHub Release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-version.outputs.tag }}
          name: Release ${{ steps.get-version.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          draft: false
          prerelease: false
          files: |
            build/distributions/*.zip
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # Publish to the JetBrains Marketplace. Secondary to the tag/release flow:
      # continue-on-error keeps a publish failure from failing the release, since
      # a version can still be uploaded to the Marketplace manually. Opt out per
      # run via the publish_marketplace input. PUBLISH_TOKEN is read by publishPlugin.
      - name: Publish to JetBrains Marketplace
        if: ${{ steps.changelog.outputs.skipped == 'false' && github.event.inputs.publish_marketplace == 'true' }}
        continue-on-error: true
        run: ./gradlew publishPlugin
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}

      - name: Summary
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.get-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.get-version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Published to Marketplace:** ${{ github.event.inputs.publish_marketplace }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changelog" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.changelog.outputs.clean_changelog }}" >> $GITHUB_STEP_SUMMARY
