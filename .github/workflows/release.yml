name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (leave empty to auto-detect from conventional commits)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write

# Ensure only one release workflow runs at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Calculate manual version bump
        id: manual-version
        if: ${{ github.event.inputs.version_bump != '' }}
        run: |
          CURRENT_VERSION=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          
          case "${{ github.event.inputs.version_bump }}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Calculated new version: $NEW_VERSION"

      - name: Conventional Changelog Action
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          version-file: './package.json'
          preset: 'conventionalcommits'
          config-file-path: '.versionrc.json'
          release-count: 0
          skip-on-empty: ${{ github.event.inputs.version_bump == '' }}
          skip-version-file: false
          skip-commit: false
          skip-tag: false
          git-push: false
          skip-ci: true
          fallback-version: '1.0.0'
          version-override: ${{ steps.manual-version.outputs.version }}

      - name: Sync version to gradle.properties
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          VERSION=${{ steps.changelog.outputs.version }}
          sed -i "s/^pluginVersion=.*/pluginVersion=$VERSION/" gradle.properties
          git add gradle.properties
          git commit --amend --no-edit
          git push --follow-tags

      - name: Build plugin
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: ./gradlew buildPlugin

      - name: Create GitHub Release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: Release ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          draft: false
          prerelease: false
          files: |
            build/distributions/*.zip
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # ============================================================
      # JetBrains Marketplace Publishing (Uncomment when ready)
      # ============================================================
      # Prerequisites:
      # 1. Generate a token at: https://plugins.jetbrains.com/author/me/tokens
      # 2. Add JETBRAINS_MARKETPLACE_TOKEN as a repository secret
      # 3. Uncomment the step below
      # ============================================================
      # - name: Publish to JetBrains Marketplace
      #   if: ${{ steps.changelog.outputs.skipped == 'false' }}
      #   run: ./gradlew publishPlugin
      #   env:
      #     PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}

      - name: Summary
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.changelog.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.changelog.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changelog" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.changelog.outputs.clean_changelog }}" >> $GITHUB_STEP_SUMMARY
